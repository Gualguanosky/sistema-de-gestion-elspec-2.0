version: '3.8'
services:
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports: [ '80:80', '81:81', '443:443' ]
    volumes: [ './npm_data:/data', './npm_letsencrypt:/etc/letsencrypt' ]
    networks: [ elspec-net ]

  db:
    image: mariadb:11.6
    container_name: elspec-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: n8n_password_elspec
      MARIADB_DATABASE: elspec_db
      MARIADB_USER: n8n_user
      MARIADB_PASSWORD: n8n_password_elspec
    volumes: [ './mysql_data:/var/lib/mysql' ]
    networks: [ elspec-net ]

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-server
    restart: always
    environment:
      - N8N_HOST=n8n.gestionelspec.site
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_BASE_URL=https://n8n.gestionelspec.site/
      - N8N_CORS_ALLOWED_ORIGINS=*
      - WEBHOOK_URL=https://n8n.gestionelspec.site/
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_DATABASE=elspec_db
      - DB_MYSQLDB_HOST=db
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_USER=n8n_user
      - DB_MYSQLDB_PASSWORD=n8n_password_elspec
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HUNTER_API_KEY=${HUNTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes: [ './n8n_data:/home/node/.n8n', '/var/www/elspec/storage:/home/node/storage' ]
    networks: [ elspec-net ]
    depends_on: [ db ]

  frontend:
    image: nginx:alpine
    container_name: elspec-frontend
    restart: always
    volumes: [ '/var/www/elspec/dist:/usr/share/nginx/html' ]
    networks: [ elspec-net ]

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: elspec-api-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=n8n_user
      - DB_PASSWORD=n8n_password_elspec
      - DB_NAME=elspec_db
      - DB_PORT=3306
    networks: [ elspec-net ]
    depends_on: [ db ]

networks:
  elspec-net:
    driver: bridge
